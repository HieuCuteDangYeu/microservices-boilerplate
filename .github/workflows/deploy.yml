name: Deploy Microservices to DigitalOcean

on:
  push:
    branches:
      - master
  workflow_dispatch:

jobs:
  deploy:
    runs-on: ubuntu-latest

    steps:
      - name: Deploy via SSH
        uses: appleboy/ssh-action@v1.0.3
        with:
          host: ${{ secrets.DROPLET_IP }}
          username: root
          key: ${{ secrets.SSH_PRIVATE_KEY }}
          script: |
            # Create the directory if it doesn't exist
            mkdir -p /var/www/microservices
            cd /var/www/microservices

            # Check if it is already a git repository
            if [ ! -d ".git" ]; then
              echo "Cloning repository..."
              git clone https://github.com/hieucutedangyeu/microservices-boilerplate.git .
            else
              echo "Pulling latest changes..."
              git pull origin master
            fi

            # Rebuild and restart the Docker containers in the background
            docker compose up -d --build
